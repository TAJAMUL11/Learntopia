LearnTopia: 

Description: A web application that offers personalized learning experiences for users. The platform can recommend courses based on user preferences, track progress, and provide interactive quizzes and assignments. 

Features:
User authentication and profile management

Course recommendation system using machine learning

Interactive quizzes and assignments

Progress tracking and analytics

Responsive design with Tailwind CSS



Making:

> Create a basic structure of files using Vite.
npm create vite@latest
npm install

> Added Tailwind
> Added Firebase {auth and firestore}
> Added React router Dom
> Added GSap for animation
> Font awesome for icons etc
> React Toastify for custom toasts
